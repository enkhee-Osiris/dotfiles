# ============================================================================
#  tmux.conf — modern, Warp-inspired tmux with Vim-style keybindings
# ============================================================================
#  Reload:   <prefix> r       (prefix = Ctrl-a, see section 4)
#  Cheat:    see the bottom of this file
# ============================================================================


# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 1. General behavior                                                      │
# └──────────────────────────────────────────────────────────────────────────┘

# True color + italics in modern terminals (Ghostty, iTerm2, Alacritty, …).
set -g  default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB,alacritty:RGB"

# Extended key reporting (CSI u): lets apps see Shift+Enter, Ctrl+;, etc.
set -s  extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Force Shift+Enter to send the standard CSI u sequence — Neovim and the
# Claude Code CLI use it to insert a newline instead of submitting input.
bind -n S-Enter send-keys Escape "[13;2u"

# Zero Escape delay — critical for snappy Vim/Neovim inside tmux.
set -s escape-time 0

# Generous scrollback (Warp keeps ~10k by default; we go bigger).
set -g history-limit 50000

# Mark windows with background activity, but stay quiet about it.
set -g monitor-activity on
set -g visual-activity  off
set -g bell-action      none

# Let programs (vim, htop, …) set the terminal title.
set -g set-titles on
set -g set-titles-string "#S · #W"

# Vim/Neovim FocusGained/FocusLost work inside tmux.
set -g focus-events on

# Shrink to the smallest *attached* client, not all clients.
setw -g aggressive-resize on


# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 2. Indexing                                                              │
# └──────────────────────────────────────────────────────────────────────────┘
#  Windows and panes start at 1 — easier to reach on the number row and
#  matches the visual order. Close a window, the rest renumber.

set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on


# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 3. Mouse — Warp-style                                                    │
# └──────────────────────────────────────────────────────────────────────────┘
#  • Click a pane or window name to focus it.
#  • Drag pane borders to resize.
#  • Scroll wheel enters copy mode and scrolls the buffer.
#  • Drag to select; selection persists after mouse-up.

set -g mouse on

# Don't snap selection back to the prompt on mouse-up.
unbind -T copy-mode-vi MouseDragEnd1Pane
bind   -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear


# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 4. Prefix key                                                            │
# └──────────────────────────────────────────────────────────────────────────┘
#  C-a is the classic GNU screen prefix — ergonomic and avoids the macOS
#  Ctrl-Space input-source switcher. It does shadow the shell's "jump to
#  start of line" — tap C-a twice to send a literal one through to the shell.

unbind C-b
set -g prefix C-a
bind  C-a send-prefix


# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 5. Reload config                                                         │
# └──────────────────────────────────────────────────────────────────────────┘

bind r source-file ~/.config/tmux/tmux.conf \; display-message " Config reloaded"


# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 6. Splits & windows — Vim semantics                                      │
# └──────────────────────────────────────────────────────────────────────────┘
#  In Vim, :vsplit makes a vertical divider (side-by-side panes) and :split
#  makes a horizontal divider (stacked panes). We match that. New panes and
#  windows inherit the current pane's working directory.

unbind '"'   # default horizontal split
unbind %     # default vertical split

bind v split-window -h -c "#{pane_current_path}"   # side-by-side  (Vim :vsplit)
bind s split-window -v -c "#{pane_current_path}"   # stacked       (Vim :split)
bind c new-window      -c "#{pane_current_path}"   # new window, same dir


# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 7. Pane navigation — hjkl                                                │
# └──────────────────────────────────────────────────────────────────────────┘
#  <prefix> h/j/k/l → focus pane in that direction.
#  Alt+h/j/k/l       → same, no prefix needed (snappy).

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R


# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 8. Pane resize & housekeeping — HJKL (repeatable)                        │
# └──────────────────────────────────────────────────────────────────────────┘
#  After <prefix>, hold the capital letter to keep resizing within the
#  repeat-time window (-r flag).

set -g repeat-time 400

bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

bind Space next-layout                                  # cycle preset layouts
bind z     resize-pane -Z                               # zoom pane (toggle)
bind x     kill-pane                                    # close pane
bind ,     command-prompt -I "#W" "rename-window '%%'"  # rename window
bind $     command-prompt -I "#S" "rename-session '%%'" # rename session


# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 9. Window navigation                                                     │
# └──────────────────────────────────────────────────────────────────────────┘

bind Tab  next-window
bind BTab previous-window


# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 10. Copy mode — Vim bindings                                             │
# └──────────────────────────────────────────────────────────────────────────┘
#    v        char-wise selection
#    V        line-wise selection
#    C-v      block selection
#    y        yank to system clipboard (pbcopy)
#    /  ?     search forward / backward
#    n  N     next / previous match
#    q  Esc   leave

setw -g mode-keys vi

bind Enter copy-mode

bind -T copy-mode-vi v      send-keys -X begin-selection
bind -T copy-mode-vi V      send-keys -X select-line
bind -T copy-mode-vi C-v    send-keys -X rectangle-toggle
bind -T copy-mode-vi y      send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel


# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 11. Appearance — Warp-inspired, minimal                                  │
# └──────────────────────────────────────────────────────────────────────────┘
#  Subtle muted borders, a soft accent on the focused pane, a clean status
#  bar with the session name on the left and date/time on the right.

# Palette — tweak to taste. These read well on most dark backgrounds.
%hidden BG="#1e1e2e"       # base background
%hidden FG="#cdd6f4"       # base foreground
%hidden MUTED="#6c7086"    # inactive elements
%hidden ACCENT="#89b4fa"   # focused pane / active window
%hidden ACCENT2="#a6e3a1"  # session indicator

# Pane borders.
set -g pane-border-lines        single
set -g pane-border-style        "fg=$MUTED"
set -g pane-active-border-style "fg=$ACCENT"
set -g pane-border-status       off

# Status bar.
set -g status          on
set -g status-position bottom
set -g status-interval 5
set -g status-justify  centre
set -g status-style    "bg=$BG,fg=$FG"

# Left: session name with a soft accent block.
set -g status-left-length 40
set -g status-left "#[fg=$BG,bg=$ACCENT2,bold] #S #[fg=$ACCENT2,bg=$BG] "

# Right: date · time.
set -g status-right-length 60
set -g status-right "#[fg=$MUTED] %a %d %b #[fg=$FG]· %H:%M "

# Window labels — active window gets the accent block.
setw -g window-status-format         "#[fg=$MUTED] #I:#W "
setw -g window-status-current-format "#[fg=$BG,bg=$ACCENT,bold] #I:#W "
setw -g window-status-separator      ""

# Command/message line + copy-mode highlight.
set -g  message-style         "bg=$ACCENT,fg=$BG,bold"
set -g  message-command-style "bg=$ACCENT,fg=$BG,bold"
setw -g mode-style            "bg=$ACCENT,fg=$BG,bold"


# ============================================================================
#  Cheat sheet   (<prefix> = Ctrl-a — tap twice to send literal C-a to shell)
# ============================================================================
#
#   Sessions / Windows
#   ──────────────────
#     <prefix> c          new window (current dir)
#     <prefix> ,          rename window
#     <prefix> $          rename session
#     <prefix> Tab        next window      <prefix> S-Tab  previous window
#     <prefix> 1..9       jump to window N
#     <prefix> d          detach session
#
#   Splits
#   ──────
#     <prefix> v          split right    (Vim :vsplit)
#     <prefix> s          split down     (Vim :split)
#     <prefix> x          close pane
#     <prefix> z          zoom pane (toggle full screen)
#     <prefix> Space      cycle layouts
#
#   Navigate                              Resize (hold to repeat)
#   ────────                              ──────────────────────
#     <prefix> h/j/k/l    move pane         <prefix> H/J/K/L
#     Alt+h/j/k/l         move (no prefix)
#
#   Copy mode (Vim)
#   ───────────────
#     <prefix> Enter      enter copy mode  (also: scroll wheel)
#     v / V / C-v         char / line / block selection
#     y                   yank to clipboard (pbcopy)
#     / ?  n N            search and step through matches
#     q / Esc             leave
#
#   Misc
#   ────
#     <prefix> r          reload this config
# ============================================================================
